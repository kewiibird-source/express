<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        table, tr, td, th{
            border : 1px solid black;
            border-collapse: collapse;
            padding : 5px 10px;
            text-align: center;
        }
        th{
            background-color: beige;
        }
        tr:nth-child(even){
            background-color: azure;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- html мҪ”л“ңлҠ” idк°Җ appмқё нғңк·ё м•Ҳм—җм„ң мһ‘м—… -->
         <div>
            <table>
                <tr>
                    <td>н•ҷлІҲ</td>
                    <td>мқҙлҰ„</td>
                    <td>н•ҷкіј</td>
                    <td>мӮӯм ң</td>
                </tr>
                {{self.info}}
            </table>
        </div>
        
    </div>
</body>
</html>

<script>
    const app = Vue.createApp({
        data() {
            return {
                // ліҖмҲҳ - (key : value)
                info : {
                    stuNo : "",
                    stuName : "",
                    stuDept : "",
                    stuGrade : ""
                }
            };
        },
        methods: {
            // н•ЁмҲҳ(л©”мҶҢл“ң) - (key : function()
            fnList: function () {
                let self = this;
                // fetchмқҳ кё°ліё methodлҠ” get
                // м„ңлІ„мқҳ getн•ЁмҲҳ нҳём¶ң
                fetch("http://localhost:3000/student")
                    .then(res => res.json())
                    .then(data => {
                        self.list = data.list;
                        
                    })
            },
            fnGetInfo: function () {
                let self = this;
                fetch("http://localhost:3000/student/"+self.info.stuNo)
                    .then(res => res.json())
                    .then(data => {
                        console.log(data.info);
                        self.info = data.info;
                        
                    })
            }
        }, // methods
        mounted() {
            // мІҳмқҢ мӢңмһ‘н•  л•Ң мӢӨн–үлҗҳлҠ” л¶Җл¶„
            let self = this;
            const queryParams = new URLSearchParams(window.location.search);
            self.info.stuNo = queryParams.get('stuNo') || ''; 
            self.fnGetInfo();
        }
    });

    app.mount('#app');
</script>
