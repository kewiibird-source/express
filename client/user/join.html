<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        table, tr, td, th{
            border : 1px solid black;
            border-collapse: collapse;
            padding : 5px 10px;
            text-align: center;
        }
        th{
            background-color: beige;
        }
        tr:nth-child(even){
            background-color: azure;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- html 코드는 id가 app인 태그 안에서 작업 -->
        <div>
            <div>
                <label>id : 
                    <input v-if="!result" v-model="userId">
                    <input v-else v-model="userId" disabled>
                </label>
                <button @click="fnCheck">중복체크</button>
            </div>
            <div>
                <label>pw : <input type="password" v-model="pwd"></label>
            </div>
            <div>
                <label>name : <input type="text" v-model="userName"></label>
            </div>
            <button @click="fnJoin">회원가입</button>
        </div>
    </div>
</body>
</html>

<script>
    const app = Vue.createApp({
        data() {
            return {
                // 변수 - (key : value)
                userId : "",
                pwd : "",
                userName : "",
                result : false
            };
        },
        methods: {
            // 함수(메소드) - (key : function())
            fnJoin: function () {
                let self = this;
                if(!self.result){
                    alert("중복체크 후 이용");
                    return;
                }
                fetch("http://localhost:3000/user/join",{
                    method : "POST",
                    headers : {
                        "Content-type" : "application/json"
                    },
                    body : JSON.stringify({
                        userId : self.userId,
                        pwd : self.pwd,
                        userName : self.userName
                    })
                })
                    .then(res => res.json())
                    .then(data => {
                        console.log(data);
                        alert(self.userName + "님 회원가입 완료!");
                        location.href="login.html";
                    })
            },
            fnCheck : function () {
                let self = this;
                // 4글자 이상 ... 등등
                fetch("http://localhost:3000/user/check/"+self.userId)
                    .then(res => res.json())
                    .then(data => {
                        console.log(data);
                        alert(data.message);
                        self.result = data.result;
                    })  

            }
        }, // methods
        mounted() {
            // 처음 시작할 때 실행되는 부분
            let self = this;
        }
    });

    app.mount('#app');
</script>
